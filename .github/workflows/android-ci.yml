name: Android CI

on:
  push:
    paths:
      - "app/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Unit tests
        run: ./gradlew testDebugUnitTest
      - name: Assemble debug
        run: ./gradlew assembleDebug
